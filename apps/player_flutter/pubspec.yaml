name: player_flutter
description: Cross-platform libmpv video player frontend.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.8
  http: ^1.6.0
  path: ^1.9.1
  shared_preferences: ^2.5.4
  xml: ^6.6.1
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_android_video:
    path: ../../third_party/media_kit_libs_android_video
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
