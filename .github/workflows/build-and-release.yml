name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'website/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'website/**'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Cache cargo-ndk
        id: cache-cargo-ndk
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-ndk
          key: ${{ runner.os }}-cargo-ndk

      - name: Install cargo-ndk
        if: steps.cache-cargo-ndk.outputs.cache-hit != 'true'
        run: cargo install cargo-ndk

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "crates/player_core -> target"

      - name: Build Rust Core for Android
        run: |
          cargo ndk -t arm64-v8a -t armeabi-v7a -o apps/player_flutter/android/app/src/main/jniLibs build --release

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Flutter Packages
        run: |
          cd apps/player_flutter
          flutter pub get

      - name: Build Flutter APK
        run: |
          cd apps/player_flutter
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rplayer-apk
          path: apps/player_flutter/build/app/outputs/flutter-apk/app-release.apk

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '最新开发版 (Latest Dev Build)' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: apps/player_flutter/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          body: |
            ${{ startsWith(github.ref, 'refs/tags/v') && '正式版本发布。' || '这是最新的开发自动编译版本，包含最新的修改。' }}
            
            提交哈希: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
