name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'website/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'website/**'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "crates/player_core -> target"

      - name: Build Rust Core for Android
        run: |
          cargo ndk -t arm64-v8a -t armeabi-v7a -o apps/player_flutter/android/app/src/main/jniLibs build --release

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Flutter Packages
        run: |
          cd apps/player_flutter
          flutter pub get

      - name: Build Flutter APK
        run: |
          cd apps/player_flutter
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rplayer-apk
          path: apps/player_flutter/build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/player_flutter/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
